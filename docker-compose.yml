version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: testforge-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testforge-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testforge-engine
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - LOG_LEVEL=info
      - WORKER_POOL_SIZE=10
      - QUEUE_CONCURRENCY=5
      - WORKER_TIMEOUT=300000
      - QUEUE_ATTEMPTS=3
      - RATE_LIMIT_MAX=100
      - RATE_LIMIT_WINDOW_MS=900000
      # Optional: set to true and provide API_KEYS to enable auth
      - API_AUTH_ENABLED=${API_AUTH_ENABLED:-false}
      - API_KEYS=${API_KEYS:-}
    volumes:
      - app_logs:/app/logs
      - app_temp:/app/temp
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - testforge-network

  # ── Observability ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: testforge-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    depends_on:
      app:
        condition: service_healthy
    networks:
      - testforge-network

  grafana:
    image: grafana/grafana:10.4.1
    container_name: testforge-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-testforge}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/grafana-dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/grafana-dashboard.json:ro
    depends_on:
      - prometheus
    networks:
      - testforge-network

  # ── Optional tools (enabled with --profile tools) ────────────────────────────

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: testforge-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - testforge-network
    profiles:
      - tools

volumes:
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_temp:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  testforge-network:
    driver: bridge
