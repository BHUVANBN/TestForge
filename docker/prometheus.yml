global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'testforge'

scrape_configs:
  - job_name: 'testforge-engine'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/api/v1/metrics/prometheus'
    scrape_interval: 10s
    honor_labels: true

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
